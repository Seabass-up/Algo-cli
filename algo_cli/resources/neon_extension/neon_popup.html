<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Algo CLI selected tab</title>
    <style>
      :root { color-scheme: light dark; font: 13px system-ui, sans-serif; }
      body { margin: 14px; min-width: 270px; }
      h1 { font-size: 15px; margin: 0 0 8px; }
      p { line-height: 1.35; margin: 8px 0 12px; }
      #status { border-radius: 6px; padding: 8px; background: color-mix(in srgb, CanvasText 8%, Canvas); }
      .actions { display: flex; gap: 8px; margin-top: 12px; }
      button { font: inherit; padding: 6px 10px; }
    </style>
  </head>
  <body>
    <h1>Algo CLI selected tab</h1>
    <p>This hardening build can observe structural page state only. It cannot click, type, upload, or download.</p>
    <div id="status" role="status" aria-live="polite">Checking status…</div>
    <div class="actions">
      <button id="connect" type="button">Observe this tab</button>
      <button id="disconnect" type="button">Disconnect</button>
    </div>
    <script src="neon_popup.js"></script>
  </body>
</html>
