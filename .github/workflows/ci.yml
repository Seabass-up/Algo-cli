name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Runtime quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project and quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff (blocking)
        run: >-
          ruff check
          algo_cli
          tests
          scripts/check_public_release.py
          scripts/check_public_history.py
          scripts/check_release_version.py
          scripts/smoke_installed_release.py
          scripts/smoke_wheel_install.py
      - name: Public source scan (blocking)
        run: python scripts/check_public_release.py
      - name: Release version source (blocking)
        run: python scripts/check_release_version.py
      - name: Runtime mypy contract (blocking)
        run: >-
          mypy
          algo_cli/main.py
          algo_cli/tool_runtime.py
          algo_cli/tools.py
          algo_cli/harness.py
          algo_cli/agent_pipeline.py
          algo_cli/execution_guardrails.py
          algo_cli/private_event_store.py
          algo_cli/perf_telemetry.py
          algo_cli/skills.py
          algo_cli/evals/competitive_harness_rating.py
          --ignore-missing-imports
          --no-strict-optional
          --follow-imports=skip
          --show-error-codes
      - name: Compile check
        run: python -m compileall -q algo_cli ollama_cli
      - name: Full suite with branch coverage floor
        run: >-
          pytest tests
          --cov=algo_cli
          --cov-branch
          --cov-report=term-missing:skip-covered
          --cov-report=xml:coverage.xml
          --cov-fail-under=57
      - name: Upload coverage evidence
        uses: actions/upload-artifact@v5
        with:
          name: coverage-python-3.12-linux
          path: coverage.xml
          if-no-files-found: error

  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: windows-latest
            python: "3.12"
          - os: macos-latest
            python: "3.12"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run full suite
        run: pytest tests

  native:
    name: Native helper checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Rust indexer tests
        run: cargo test --manifest-path harness-indexer/Cargo.toml --locked
      - name: Go gateway tests
        working-directory: harness-gateway
        run: go test ./...

  package:
    name: Build and inspect distributions
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Build wheel and source distribution
        run: python -m build
      - name: Validate metadata and public contents
        run: |
          python -m twine check dist/*
          python scripts/check_public_release.py --artifacts-only --artifact dist/*.whl --artifact dist/*.tar.gz
      - uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  package-smoke:
    name: Installed wheel (${{ matrix.os }})
    needs: package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
      - name: Install and exercise wheel in an isolated home
        run: python scripts/smoke_wheel_install.py dist
