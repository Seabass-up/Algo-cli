name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Runtime quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project and quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff (blocking)
        run: >-
          ruff check
          algo_cli
          tests
          scripts/check_public_release.py
          scripts/check_public_history.py
          scripts/check_release_version.py
          scripts/smoke_installed_release.py
          scripts/smoke_wheel_install.py
      - name: Public source scan (blocking)
        run: python scripts/check_public_release.py
      - name: Reachable history scan (blocking)
        run: python scripts/check_public_history.py --allow-contributor-identities
      - name: Release version source (blocking)
        run: python scripts/check_release_version.py
      - name: Runtime mypy contract (blocking)
        run: >-
          mypy
          algo_cli/main.py
          algo_cli/tool_runtime.py
          algo_cli/tools.py
          algo_cli/harness.py
          algo_cli/agent_pipeline.py
          algo_cli/execution_guardrails.py
          algo_cli/private_event_store.py
          algo_cli/perf_telemetry.py
          algo_cli/skills.py
          algo_cli/evals/competitive_harness_rating.py
          --ignore-missing-imports
          --no-strict-optional
          --follow-imports=skip
          --show-error-codes
      - name: Compile check
        run: python -m compileall -q algo_cli ollama_cli
      - name: Full suite with branch coverage floor
        run: >-
          pytest tests
          --cov=algo_cli
          --cov-branch
          --cov-report=term-missing:skip-covered
          --cov-report=xml:coverage.xml
          --cov-fail-under=57
      - name: Upload coverage evidence
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: coverage-python-3.12-linux
          path: coverage.xml
          if-no-files-found: error

  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.10"
          - os: windows-latest
            python: "3.12"
          - os: macos-latest
            python: "3.12"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run full suite
        run: pytest tests

  native:
    name: Native helper checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Rust indexer tests
        run: cargo test --manifest-path harness-indexer/Cargo.toml --locked
      - name: Go gateway tests
        working-directory: harness-gateway
        run: go test ./...

  website:
    name: Website build and safety gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Render and route tests
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Dependency audit
        run: npm audit

  package:
    name: Build and inspect distributions
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade build twine
      - name: Build wheel and source distribution
        run: python -m build
      - name: Validate metadata and public contents
        run: |
          python -m twine check dist/*
          python scripts/check_public_release.py --artifacts-only --artifact dist/*.whl --artifact dist/*.tar.gz
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  package-smoke:
    name: Installed wheel (${{ matrix.os }})
    needs: package
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: python-package-distributions
          path: dist/
      - name: Install and exercise wheel in an isolated home
        run: python scripts/smoke_wheel_install.py dist
