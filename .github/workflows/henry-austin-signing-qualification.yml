name: Austin signed-package qualification

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: austin-signing-${{ github.repository_id }}
  cancel-in-progress: false

jobs:
  signed-package:
    name: Developer ID, notarization, and Gatekeeper
    environment: native-hardening
    runs-on:
      group: algo-cli-signing
      labels: [self-hosted, macOS, ARM64, algo-cli-signing-ephemeral]
    timeout-minutes: 90
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Reject an unprotected or substituted dispatch before checkout
        if: ${{ github.repository_id != '1297752684' || !github.ref_protected || github.ref != format('refs/heads/{0}', github.event.repository.default_branch) }}
        run: |
          echo "::error::Austin signing qualification requires the pinned repository and protected default branch."
          exit 1
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          clean: true
          persist-credentials: false
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Verify ephemeral signer image, checkout, and log forwarder
        env:
          AUSTIN_RUNNER_ATTESTATION_SHA256: ${{ secrets.AUSTIN_RUNNER_ATTESTATION_SHA256 }}
        run: /usr/bin/python3 scripts/henry_austin_signing_runner.py
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.26"
      - name: Install locked qualification environment
        run: uv sync --frozen --no-editable --no-cache --extra dev --reinstall-package algo-cli-runtime
      - name: Verify protected source and signed-package contracts
        run: |
          uv run --frozen --no-editable --no-cache --extra dev python -I scripts/oliver_installed_source_parity.py
          uv run --frozen --no-editable --no-cache --extra dev python scripts/david_hardening_gate.py
          uv run --frozen --no-editable --no-cache --extra dev ruff check algo_cli/austin_release_packager.py scripts/austin_release_packager.py scripts/henry_austin_lifecycle_authority_preflight.py scripts/henry_austin_prepare_public_key.py scripts/henry_austin_signing_provisioner.py scripts/henry_austin_signing_runner.py scripts/ada_austin_signing_lifecycle_receipt.py scripts/henry_github_hardening_readiness.py tests/test_austin_release_packager.py tests/test_henry_austin_lifecycle_authority_preflight.py tests/test_henry_austin_prepare_public_key.py tests/test_henry_austin_signing_provisioner.py tests/test_henry_austin_signing_runner.py tests/test_ada_austin_signing_lifecycle_receipt.py tests/test_henry_github_hardening_readiness.py
          uv run --frozen --no-editable --no-cache --extra dev mypy algo_cli/austin_release_packager.py scripts/austin_release_packager.py scripts/henry_austin_lifecycle_authority_preflight.py scripts/henry_austin_prepare_public_key.py scripts/henry_austin_signing_provisioner.py scripts/henry_austin_signing_runner.py scripts/ada_austin_signing_lifecycle_receipt.py scripts/henry_github_hardening_readiness.py --ignore-missing-imports --no-strict-optional --follow-imports=skip --show-error-codes
          uv run --frozen --no-editable --no-cache --extra dev pytest -q tests/test_austin_release_packager.py tests/test_henry_austin_lifecycle_authority_preflight.py tests/test_henry_austin_prepare_public_key.py tests/test_henry_austin_signing_provisioner.py tests/test_henry_austin_signing_runner.py tests/test_ada_austin_signing_lifecycle_receipt.py tests/test_henry_github_hardening_readiness.py tests/test_austin_native_package.py
      - name: Materialize independently anchored public key
        env:
          AUSTIN_DISABLED_AUTHORITY_PUBLIC_KEY_BASE64URL: ${{ secrets.AUSTIN_DISABLED_AUTHORITY_PUBLIC_KEY_BASE64URL }}
        run: >-
          uv run --frozen --no-editable --no-cache --extra dev python
          scripts/henry_austin_prepare_public_key.py
          --output "${RUNNER_TEMP}/AustinDisabledNativeAuthority.bin"
      - name: Build, sign, notarize, staple, and assess
        env:
          AUSTIN_APPLICATION_IDENTITY: ${{ secrets.AUSTIN_APPLICATION_IDENTITY }}
          AUSTIN_INSTALLER_IDENTITY: ${{ secrets.AUSTIN_INSTALLER_IDENTITY }}
          AUSTIN_TEAM_ID: ${{ secrets.AUSTIN_TEAM_ID }}
          AUSTIN_NOTARY_PROFILE: ${{ secrets.AUSTIN_NOTARY_PROFILE }}
          AUSTIN_EXTENSION_ORIGIN: ${{ secrets.AUSTIN_EXTENSION_ORIGIN }}
          AUSTIN_BUILD_NUMBER: ${{ github.run_number }}
          AUSTIN_DISABLED_AUTHORITY_PUBLIC_KEY_SHA256: ${{ secrets.AUSTIN_DISABLED_AUTHORITY_PUBLIC_KEY_SHA256 }}
        run: >-
          uv run --frozen --no-editable --no-cache --extra dev python
          scripts/austin_release_packager.py
          --application-identity "${AUSTIN_APPLICATION_IDENTITY}"
          --installer-identity "${AUSTIN_INSTALLER_IDENTITY}"
          --team-id "${AUSTIN_TEAM_ID}"
          --notary-profile "${AUSTIN_NOTARY_PROFILE}"
          --extension-origin "${AUSTIN_EXTENSION_ORIGIN}"
          --disabled-native-authority-public-key "${RUNNER_TEMP}/AustinDisabledNativeAuthority.bin"
          --disabled-native-authority-public-key-digest "${AUSTIN_DISABLED_AUTHORITY_PUBLIC_KEY_SHA256}"
          --output-directory "${RUNNER_TEMP}/AustinSignedQualification-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          --build-number "${AUSTIN_BUILD_NUMBER}"
      - name: Attest signed qualification artifacts
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            ${{ runner.temp }}/AustinSignedQualification-${{ github.run_id }}-${{ github.run_attempt }}/*.pkg
            ${{ runner.temp }}/AustinSignedQualification-${{ github.run_id }}-${{ github.run_attempt }}/AdaAustinReleaseEvidence.json
          create-storage-record: false
      - name: Retain signed qualification artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: austin-signed-qualification
          path: |
            ${{ runner.temp }}/AustinSignedQualification-${{ github.run_id }}-${{ github.run_attempt }}/*.pkg
            ${{ runner.temp }}/AustinSignedQualification-${{ github.run_id }}-${{ github.run_attempt }}/AdaAustinReleaseEvidence.json
          if-no-files-found: error
          retention-days: 7
      - name: Remove transient qualification material
        if: always()
        run: |
          rm -f -- "${RUNNER_TEMP}/AustinDisabledNativeAuthority.bin"
          rm -rf -- "${RUNNER_TEMP}/AustinSignedQualification-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          if [[ -x script/austin_build_and_run.sh ]]; then
            ./script/austin_build_and_run.sh clean
          fi
