name: Publish release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Verify and build distributions
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project and release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install build twine
      - name: Verify source, version, and tests
        run: |
          python scripts/check_release_version.py --tag "${{ github.event.release.tag_name }}"
          python scripts/check_public_release.py
          python scripts/check_public_history.py
          ruff check algo_cli tests scripts/check_public_release.py scripts/check_public_history.py scripts/check_release_version.py scripts/smoke_installed_release.py scripts/smoke_wheel_install.py
          pytest tests
      - name: Build and inspect distributions
        run: |
          python -m build
          python -m twine check dist/*
          python scripts/check_public_release.py --artifacts-only --artifact dist/*.whl --artifact dist/*.tar.gz
          python scripts/smoke_wheel_install.py dist
      - uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/algo-cli
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
