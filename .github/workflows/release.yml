name: Publish release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Verify and build distributions
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install project and release tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install build twine
      - name: Verify source, version, and tests
        run: |
          python scripts/check_release_version.py --tag "${{ github.event.release.tag_name }}"
          python scripts/check_public_release.py
          python scripts/check_public_history.py --allow-contributor-identities
          ruff check algo_cli tests scripts/check_public_release.py scripts/check_public_history.py scripts/check_release_version.py scripts/smoke_installed_release.py scripts/smoke_wheel_install.py
          pytest tests
      - name: Verify website
        working-directory: website
        run: |
          npm ci
          npm test
          npm run lint
          npm audit
      - name: Build and inspect distributions
        run: |
          python -m build
          python -m twine check dist/*
          python scripts/check_public_release.py --artifacts-only --artifact dist/*.whl --artifact dist/*.tar.gz
          python scripts/smoke_wheel_install.py dist
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/algo-cli-runtime
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
